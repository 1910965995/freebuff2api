version: "3.9"

services:
  # ============================================================
  # freebuff2api 主服务
  # ============================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freebuff2api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      # 覆盖 .env 中的 HOST —— 容器内必须监听 0.0.0.0
      FREEBUFF_HOST: "0.0.0.0"
      FREEBUFF_PORT: "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # ---- 可选资源限制 ----
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "1"
    #       memory: 512M

  # ============================================================
  # Nginx 反向代理（可选）
  # 如果不需要对外暴露或已另有反代，可以注释掉整个块
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: freebuff2api-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL 证书（Let's Encrypt 等），如有
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
