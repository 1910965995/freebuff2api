# ============================================================
# Nginx 反向代理配置 — freebuff2api
# ============================================================

upstream freebuff2api {
    server api:8000;
}

# ---- HTTP → HTTPS 重定向（如有证书） ----
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;   # 启用 HTTPS 时取消注释

    server_name your-domain.com;   # ← 改为你的域名或 IP

    # ---- SSL（Let's Encrypt 等） ----
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # ---- 日志 ----
    access_log /var/log/nginx/freebuff2api_access.log;
    error_log  /var/log/nginx/freebuff2api_error.log;

    # ---- 请求体大小限制（防止滥用） ----
    client_max_body_size 16m;

    # ---- 健康检查端点直通 ----
    location /healthz {
        proxy_pass http://freebuff2api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ---- API 代理 ----
    location / {
        proxy_pass http://freebuff2api;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 流式 SSE 不缓冲
        proxy_buffering off;
        proxy_cache off;

        # 超时设置（流式对话需要长连接）
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
